- name: install nginx
  hosts: all
  become: yes
  tasks:
  - name: print the stats
    ansible.builtin.debug:
       msg: " {{ansible_facts }} "
  - name: install nginx if it is RedHat
    ansible.builtin.dnf:
      name: nginx
      state: present
    when: ansible_os_family == "RedHat"

  - name: install nginx if it is debian
    ansible.builtin.apt:
      name: nginx
      state: present
    when: ansible_os_family == "debian"