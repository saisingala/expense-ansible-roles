- name: disable nodejs old version
  ansible.builtin.command: dnf module disable nodejs -y

- name: enable nodjs latst version
  ansible.builtin.command: dnf module enable nodejs:20 -y

- name: install nodejs
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
  - nodejs
  - mysql

- name: create expense login_user
  ansible.builtin.user:
    name: expense

- name: create app directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: download the code
  ansible.builtin.get_url:
    url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-backend-v2.zip
    dest: /tmp/backend.zip

- name: extract the code
  ansible.builtin.unarchive:
    src: /tmp/backend.zip
    dest: /app
    remote_src: yes

- name: install dependences
  ansible.builtin.command: npm install
  args:
    chdir: /app

- name: copy the backend service # copy only works for files without variable
  ansible.builtin.template:
    src: backend.service.j2
    dest: /etc/systemd/system/backend.service

- name: ansible to install Pymql
  ansible.builtin.pip:
    name: 
    - PyMySQL
    - cryptography
    executable: pip3.9

- name: import mysql data
  community.mysql.mysql_db:
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_host: "{{ mysql_login_host }}"
    target: /app/schema/backend.sql
    name: all
    state: import

- name: deamon reload
  ansible.builtin.systemd_service:
    state: restarted
    daemon_reload: true
    name: backend
