- name: disable nodejs old version
  ansible.builtin.command: dnf module disable nodejs -y

- name: enable nodjs latst version
  ansible.builtin.command: dnf module enable nodejs:20 -y

- name: install nodejs
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
  - nodejs
  - mysql

- name: create expense login_user
  ansible.builtin.user:
    name: expense

- name: import tasks from common roles
  ansible.builtin.import_role:
    name: common
    tasks_from: app-pre-req

- name: install dependences
  ansible.builtin.command: npm install
  args:
    chdir: /app

- name: copy the backend service # copy only works for files without variable
  ansible.builtin.template:
    src: backend.service.j2
    dest: /etc/systemd/system/backend.service

- name: ansible to install Pymql
  ansible.builtin.pip:
    name: 
    - PyMySQL
    - cryptography
    executable: pip3.9

- name: import mysql data
  community.mysql.mysql_db:
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_host: "{{ mysql_login_host }}"
    target: /app/schema/backend.sql
    name: all
    state: import

- name: deamon reload
  ansible.builtin.systemd_service:
    state: restarted
    daemon_reload: true
    name: backend
